body:
  text: 淨業學人果能嚴德述我佛慈悲大醫王開示淨土指西方彌陀現在親説法勢至觀音陪兩傍六方諸佛齊聲讚千二羅漢喜非常若人一念心不亂管教七日上蓮西方聖境妙無窮七寶裝成極樂宮處處園林如錦繡重重樓閣玉玲瓏對對鴛鴦宣妙德雙雙鸚鵡法名宏彌陀為我談真諦喜得虗空笑滿容欲入西方福非輕蓮花托質普天明一切善女轉男樣見聞都是法名稱形容身體黃金相挽手同遊佛國城諸般快樂無難事這要當人願力真未歸極樂尚閻浮飄入輪回苦無休縱然玉誥皇封敕福報完時何處求趁早在生修淨土莫教臨死怨閻羅娑婆不是安身處故鄉只在藕花洲春王正月是新年賀歲人人禮貌全兒女打扮花神樣佳人穿戴像天仙目前雖然風光好難留青春不老顏西方皆是長生體非比閻浮濁世天二月春分和氣祥東方日出暖揚揚百行事業歸正務運貨客商走長江青山緑水千年在惟有浮軀不久長奉勸世人回頭好一心念佛到蓮三月清明萬物和桃紅柳緑景堪誇一生全福人間少十分傷悲世上多趁早在生修淨土莫教死後悔當初佛門是有安間法休聽間言主意無四月夏節天氣晴休貪滋味殺生靈青草半埋紅粉客黃泉多見黑頭人皆因前世殺害重今生夭折報分明清潔瓜果時筍菜更比腥羶美十分五月端陽夏至來紅塵堆裏實可哀兒在腹中娘受難猶如鐵佛坐破車勸君早早求出路好向蓮結聖胎他日親赴極樂國華中産取玉嬰孩六月荷花映水紅妙善公主證圓通心內不起無明火何有暖氣到胸中勸君早把彌陀念念到心空理是融他日親赴蓮池會華中現出主人翁時逢七月最悽涼目連地府去尋娘一心救度親生母啓建蘭盆大道場雖有孝子賢孫好總要當人願力強始知妄念輪回苦誓願今生歸故鄉八月中秋天氣涼風吹丹桂有微香娑婆界內間人少極樂國中壽命長勸君早發西方願免得臨終失主張始知塵途為客苦撒手歸西返故鄉九月重陽菊花黃人逢謗毀最難當寬著肚皮呵呵笑由他惡口亂顛狂時時妄想要勤掃日日彌陀不可忘念到心空魔王退不勞彈指到西方十月寒天西北風孟宗哭到竹園中二十四孝留千古華池仍舊不相逢當初若把彌陀念今朝母子伴慈容一子修行成正覺九祖同生淨土中冬至一陽天氣寒蒲團打坐靜中安念念彌陀心寂寂聲聲佛號妄泯泯內有清虗含性月外無塵事到心田識得其中真淨土靈光照徹玉池蓮大雪紛紛臘月終光陰如箭快似梭由他送舊辭年夕莫管迎新賀歲多專心勤修生淨土靈機透脫不須求微塵掃盡彌陀現早到蓮彼岸頭寅時念佛要留神靜坐蒲團天已明聲聲佛號身之寶句句彌陀出世因安得西方今日到好將妄念一時平願我親見彌陀後違入娑婆度有情卯時念佛莫蹉跎休把光陰空裏投根塵掃盡心花現凡情不起妄想丟處處無非彰自性頭頭盡是渡人河念到心空及第日入聖超凡一剎那辰時念佛要加功一句彌陀分外融萬法皆空心佛現一塵不染六根通修行若得如是境何愁淨土不相逢法藏勿忘悲心願定來接我轉家中巳時念佛莫放鬆四字洪名緊記胸出門説説思鄉話客來談談舊家風九蓮慈母多遙望哀子塵途十分煢一朝了得浮軀脫母子相逢喜氣濃午時念佛愈心酸忽然淚落到唇邊娑婆一鉢多難化西方百味現其前勸君早把彌陀念免得塵勞被業牽不用別求玄妙法這消一箇念頭堅未時念佛日西斜靜坐蒲團思故鄉自慙淺識非僧德羡他鄰山道力強若非清照寒潭月爭得塵消徹底彰但願同修諸善友晝夜六時恆吉祥申時念佛晚鐘鳴要把無常念念存是日已過命亦減勸君及早辦前程專心勤念彌陀佛休將家業挂在心胸中藏得四箇字明珠百八是家珍酉時念佛日西沉須識娑婆是火坑因果未明真黑暗無常不帶路燈行勸君早把彌陀念休言紅粉貌青春西方不分男和女妙善修時最年輕戌時念佛要心堅想起孤魂實可憐陰風慘慘無依靠紛紛愁雨絶香煙先修瑜伽來超薦千堂功德結良緣待我親見彌陀後一齊度上玉池蓮亥時念佛冷清清稍臥片刻養精神彌陀不礙行坐臥呼吸之中好記名睡眼朧諸佛現蓮消息以通音醒來已是三更後不覺心中十分清子時念佛最心清起坐披衣信願深一息不來誰是我六根才動假虗名逢緣不攀非為礙遇境無著念自平誓願今生歸淨土蓮華國裏見慈親丑時要把報鐘鳴祝讚皇帝萬萬春再祝信施增福壽願祈天下樂太平專心勤念彌陀佛發願期求淨土生他日悟入蓮旨免得娑婆受苦情一寸光陰一寸金勸君念佛早修行假饒玉葉金珠體難免雞皮鶴髮形宿世有根信願切現生無慧不回心等到大限臨終日那樣虗來那樣真我為僧來妄想多勸人念佛願無休善信見聞心歡喜惡人肚裏起風波裝著耳聾開口笑不聽良言也由他宿世有緣今肯信同登彼岸見彌陀戒殺醒世偈每逢曉雞鳴屠戶起狠心將他四腳捆尖刀刺項頸苦痛極聲呌血如大水淋可憐冤難訴頃刻見閻君滾湯本無情皮毛雨處分破肚暫頭落抽腸力剜心五臟各離散三魂何處存只等為事業問君平不平滋味貪口腹非魚就是肉這箇喜肋條那箇愛豬頭百貨中百客千刀又千剮如此養身命循環恐反復人身最難投投又遇中國不思行善事身口反造惡雖有好計謀難免無常捉閻君問起你何言好回復偶然子孫孝穿戴白如雪兒女哀哀哭賢媳又嗥淘棺材雖高大難好件件裝不憐當年愛將他葬荒郊不論貧與富難免到此步那時苦悽惶信佛求救度奉勸世間人趁早須省悟三界如火宅快快尋出路知足歌惟善為之寶身安就是福知足勿怨貧無飯就是粥三餐將就過何必要積蓄一世不凍餓千足與萬足富豪如敵國臨終難合目清虗冷淡人無榮亦無辱世事宜看淡立志須要篤正直無私事佛歡神欽伏凡有修行人先當學忍辱獨處好參禪羣居要和睦黃虀粗茶飯切莫嫌淡泊梅花噴鼻香一番寒徹骨苦命享榮華壽命恐不足有福若肯惜將來受天祿斷愛除煩惱經典要熟讀在世不行善徒勞空忙碌光陰甚迅速幻身不長久紅塵有了日青春快白頭三寸氣若斷空手見閻羅勸君回頭好及早念彌陀慈悲行方便隨緣度春秋正心學佛道做事不虗浮有財宜救濟無錢莫強求一朝善果熟跳出苦娑婆修身成佛偈修心往生偈此偈觀音菩薩夢中金口親傳醒來沐手就將桌上點經硃筆焚香跪寫即成此偈寫畢東方將明香氣滿房身心清涼望空頂禮四十八拜光緒三年三月初十事大清徐氏揚母法名培方錢塘人慈孝忍柔草九而寡守志皈佛精修淨業禮拜五經法華晨昏功課無間日誦金剛地藏後因胞兄接住江西衣食現享日夜念佛有一日念至半夜跪瞌蒲團半醒半睡見觀音勢至二大士云善哉善哉汝勇猛精進皆因宿世善根所致可惜你陽壽無多我賜汝壽隨修隨延奈因世人不明因果者多修善者稀我有勸女偈一篇汝勸世上女人念佛要緊功滿果圓我來接汝引見彌陀恐汝忘懷隨手瓶中甘露滿入口中霎時身心清涼頂禮大士百拜念偈而醒辦魔略説修行念佛非細事內外諸魔亂正法少無主宰著愛境因境打動墮魔網本是善因反遭惡學道之人要慎防愚開四條辦魔義自審自察須仔細第一宿冤魔為之業障遠劫今生凡位中忠孝仁義禮不通殺盜淫妄貪瞋癡多結冤家今日逢若學大道來侵撓能障聖道不成功這等宿冤無可奈哀求三寶禮金容慚愧懇禱求懺悔冤家自退散無蹤再發四大宏誓願普利羣生淨土中第二外惑魔為之人障小人無端揑間言謗得修行人不安此魔繞亂非為別皆因缺禮或少權或者貢高或口直行粗仗勢肚不寬若稱己能談他過或欠忍耐少和顏故招惡口多謗毀亂得修心障本源慕道之人宜避下退己養德耐心安第三口業魔為之狂障口業魔者為狂障不儉言語憑蹤心話多喪氣勞脾形散亂正念不現性談玄談妙講宗教自誇得悟他愚迷吟詩歌賦信口唱昔日凶善今賢愚論人長短説是非平論今古興廢不干己事平空怒背後毀譽面稱機一切惡言失正念修行之人要當忌不但儉言多養德而且使心不動亂第四病苦魔為之苦障病苦魔者為苦障身多疾病因業愆或自失調生百病愚開數條預自防調理脾胃擇飲食少貪厚味忌生冷食畢莫睡夜少餐飽莫負重飢莫誦少吃五味忌非物休貪煎炒忌腐爛溼處坐禪風處睡汗出入水受暑涼當風沐浴露星臥大飢大飽大喜怒大寒大暑大雨露內傷外感共失調生諸瘡病身不安普勸須宜預自防以上四條略舉魔欲辦其細閲楞嚴世上多少修行輩卻被病苦障真源總言飲食無禁忌弄得年來顛倒顛我先二十年以前不肯聽信古人言隨心任意不做忌最喜酸臭愛腐爛纍年以來多疾病好像一隻碎器碗延醫服藥全無效枉費工夫枉費錢至今試驗方理會病症全愈身體安若人依得此偈者保汝災難盡消完念佛功德不可思議一句彌陀最方便無心禮念苦難言在生雖不造惡業臨終總是黑漫漫一句彌陀最方便唐朝有箇白樂天夫妻五人齊修道至今還在玉池蓮一句彌陀最方便不費工夫不費錢但教畢世無間斷何愁難到法王前一句彌陀最方便休言家事未曾間手做生活口念佛臨終帶業往西天一句彌陀最方便多生冤孽現其前邵彪夢怖極聲念蛤蜊化往生天一句彌陀最方便無論禽畜與人天八哥解同僧口念死埋平地出青蓮一句彌陀最方便十念能超生死關除出不信謗法輩其餘有願必生蓮一句彌陀最方便小小孩童易能言雖然有口無心念蓮池上面有因緣一句彌陀最方便無論紅黑暗房間只要志誠信願切那時地獄化成蓮一句彌陀最方便不信之人真可憐辜負我佛慈悲願臨終仍舊墮無間一句彌陀最直捷善才昔日參知識參到德雲童子處示他念佛成三昧一句彌陀最直捷宋朝有箇吳子才三界無安不可往西方淨土有蓮胎一句彌陀最直捷無論十惡并五逆當初廣額回心轉屠刀放壞後成佛一句彌陀最直捷從前惡業易能滅劉光夫婦回心轉六年功圓齊成佛一句彌陀最可超縱有殺業易能消善和十聲佛未滿羣牛退滅便消遙一句彌陀最可超胸有雜念易能消宋朝有箇黃打鐵至今淨土樂消遙一句彌陀最可超十萬億土路非遙六時禮念無間斷九蓮花上有名標一句彌陀最易超吳瓊孽俱尚能消非是懶拙妄言述往生傳上有名標一句彌陀莫懈怠心中念念常自在直到命畢無間斷臨終不到淨土外一句彌陀早皈依修行要學釋家禮恭敬拜念能如法必定不在三界裏一句彌陀莫懈怠行住坐臥常自在願我早登下下品祈求不生西方外戒淫偈花街柳巷最堪憐惟心貪戀苦難言胭脂畫面姣千樣龍麝薰衣俏百般三寸氣在多歡愛一旦無常不忍觀勸君早求清泰計莫羡紅塵半世仙本性偈世間婦相是天然口內稱呼分兩般修行不知身外事那有工夫思女男大道本來沒形相法界衆生一體觀真源湛寂虗空碎人牛無迹月孤圓自慙偈山居靜室最安然平生勿喜愛攀緣時常缺柴又缺米往來無客亦無錢隨人讚歎隨人謗由他恭敬由他嫌惟有一句彌陀佛晝夜虔持不敢間收心自在要無礙要無愁本分安身到處悠剃徒少留煩惱少皈依多收是非多緣法必廣心必雜利名難斷道難修求人還宜求己好念情不如念彌陀朝拜名山朝山過海要心堅到處隨緣到處安溪邊野菜吃不盡路上枯柴燒勿完胸中只有一句佛腰內洗空無半錢倦時樹下和衣睡醒來明月照胸前懶僧偈懶僧窮極苦難言黃虀白飯未周全手中還有珠百八身上留得衣半件心裏記著只聲佛意外並無礙牽若人問我功多少一句彌陀尚未完醒世偈時時念佛要當先浮生幻質不牢堅山中常見千載樹世上希有壽百年多少聰明埋青草許多愚癡赴黃泉祈男祈女祈福壽何勿祈求淨土天十二大願信手拈出香一瓣無物無火亦無煙此香根源生淨土苗寄娑婆無底天爇向爐中供養佛蓮池會上諸菩薩惟願慈尊來護佑滿我悲願早周圓一願皇帝萬萬歲福基龍位永傳綿國后太子齊千歲金枝玉葉慶團圓二願滿朝公卿相良將忠臣世代傳護駕護國護佛法增福增壽喜綿綿三願統省府州縣護國安民代代傳文武官僚增祿位各署貴眷壽綿綿四願天下三災滅三教興隆出聖賢風調雨順民安樂處處永慶大豐年五願各處庵觀寺山門清淨法無邊剃度接代傳三寶僧成佛果道成仙六願信心衆士女皈依三寶道心堅有求有應速成佛無魔無障早生蓮七願人人具佛性無凶無惡善心堅無貧無苦無橫夭有財有子福綿綿八願天下男子漢知因識果孝為先無鰥無獨無災難有船有櫓每俱全九願世上婦女輩賢良柔和貌如仙無孤無寡無橫産有根有葉果花全十願亡故男女等六道四生盡升天地獄變成消遙境血湖化作寶池蓮十一願我壽命完西方勝境現其前七日之前自知曉更衣念佛等歸天十二願求臨命終衆聖接引玉池蓮但我一見彌陀後違入娑婆開法船懶僧祈禱已周圓祝讚人人福壽全願我早滿菩提志同登彼岸到西天願以此功德普及於一切我等與信心皆共成佛道
