body:
  text: 時時念佛序楞嚴經云歸元無二路方便有多門惟我世尊曠劫精修圓成八萬四千度生法門因為接引法界眾生統歸大圓鏡智遺留三藏十二部經在世奈何末法之中去聖時遙薄福凡夫幾人能覩惟有淫詞小曲能入耳目邪心熾盛不知不覺造成三塗嗟乎眾生流浪愛河漂沉業海生死輪迴出沒須臾不聞佛法何有了期一念失足萬刧難復余自慙業重障深才疎慧淺不通儒書音韻權將塵勞苦惱西方樂境按月良時編集斯錄自約警䇿念佛令他初心入門直徑無非月月指示歸去法時時提醒本來人惟願善男信女感入識田永為道種如能信行願切同生西方淨土矣光緒三年七月古杭西溪玉池道人謹識時時好念佛目錄十二個月念佛偈十二時中念佛偈戒殺放生偈知足將就偈脩心往生寶塔圖脩身成佛寶塔圖觀世音菩薩夢傳勸世女人念佛實跡大勢至菩薩夢傳勸世清淨口業寶偈辦魔略說念佛功德不可思議戒淫偈本性偈自慙偈收心自在朝山偈懶僧念佛醒世偈十二大願零編偈曰戒殺放生錄要言脩心忍耐刻流傳孝子古跡等編集未曾收入此中間
